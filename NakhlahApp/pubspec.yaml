name: nakhlah
description: "Nakhlah — AI-powered date fruit identification app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_storage: ^13.2.0
  google_sign_in: ^6.3.0
  cloud_firestore: ^6.2.0
  image_picker: ^1.2.1
  permission_handler: ^12.0.1
  google_fonts: ^6.2.1
  logger: ^2.5.0
  shimmer: ^3.0.0
  shared_preferences: ^2.2.3
  camera: ^0.10.5
  share_plus: ^10.1.4
  uuid: ^4.5.1              # NEW — generates unique IDs for scan history entries
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/