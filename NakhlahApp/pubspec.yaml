name: nakhlah
description: "Nakhlah — AI-powered date fruit identification app (fully offline ONNX inference)."
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # ── UI & Navigation ────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # ── Firebase ───────────────────────────────────────────────────────────────
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_storage: ^13.2.0
  cloud_firestore: ^6.2.0

  # ── Auth ───────────────────────────────────────────────────────────────────
  # google_sign_in removed — phone OTP only

  # ── Networking (kept for future analytics; NOT used for inference) ─────────
  dio: ^5.7.0

  # ── Camera & Image ────────────────────────────────────────────────────────
  camera: ^0.10.5
  image_picker: ^1.2.1
  image: ^4.2.0                # ← NEW: image resize/crop/encode in isolate
  permission_handler: ^12.0.1

  # ── Local AI Inference (ONNX) ─────────────────────────────────────────────
  onnxruntime: ^1.4.1           # ← ONNX Runtime Flutter binding
  path_provider: ^2.1.5         # ← extract model asset to documents dir

  # ── Storage & State ───────────────────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ── Utilities ─────────────────────────────────────────────────────────────
  logger: ^2.5.0
  share_plus: ^10.1.4
  uuid: ^4.5.1
  app_links: ^6.4.0            # ← Deep link handling (password reset flow)

  # ── Localisation ──────────────────────────────────────────────────────────
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  shared_preferences_android: 2.4.21

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/            # ← NEW: nakhlah_v2.onnx + date_metadata.json
